<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ request.user.username }}'s Profile | MyApp</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4a90e2, #50c9c3);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .profile-container {
            background: white;
            border-radius: 15px;
            padding: 40px 35px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
            font-weight: 600;
        }

        h3 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #4a90e2;
            font-size: 20px;
            border-bottom: 2px solid #4a90e2;
            display: inline-block;
            padding-bottom: 4px;
        }

        img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        form {
            text-align: left;
            margin-top: 20px;
        }

        form p {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="file"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #4a90e2;
            outline: none;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #357ABD;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #4a90e2;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }

        .messages {
            margin-top: 15px;
            color: red;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .profile-container {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h2>{{ request.user.username }}'s Profile</h2>

        {% if profile.profile_pic %}
            <img src="/media/images/picc.png" alt="Profile Picture">
        {% else %}
            <img src="https://via.placeholder.com/150" alt="Default Profile Picture">
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <h3>Account Info</h3>
            {{ user_form.as_p }}

            <h3>Profile Info</h3>
            {{ profile_form.as_p }}

            <button type="submit">Save Changes</button>
        </form>

        <a href="{% url 'dashboard' %}">Back to Dashboard</a>

        <div class="messages">
            {% for msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
