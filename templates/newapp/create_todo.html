{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Todo | MyApp</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .todo-container {
      background: #fff;
      width: 100%;
      max-width: 700px;
      border-radius: 15px;
      padding: 35px 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      animation: fadeIn 0.8s ease;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header h2 {
      color: #333;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h2 span {
      font-size: 16px;
      color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      padding: 5px 12px;
      border-radius: 25px;
      font-weight: 600;
    }

    /* Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
      display: block;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 15px;
      transition: 0.3s;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    textarea {
      resize: none;
      min-height: 100px;
    }

    .btn-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .save-btn {
      background: #667eea;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .save-btn:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    .back-link {
      text-decoration: none;
      color: #667eea;
      font-weight: 600;
      transition: 0.3s;
    }

    .back-link:hover {
      color: #5a67d8;
      text-decoration: underline;
    }

    /* Messages */
    .messages {
      margin-top: 20px;
      color: green;
      font-weight: 500;
      text-align: center;
    }

    @media (max-width: 600px) {
      .todo-container {
        padding: 25px 20px;
      }

      .header h2 {
        font-size: 20px;
      }

      .header h2 span {
        font-size: 14px;
      }

      .save-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="todo-container">
    <div class="header">
      <h2>
        Add New Todo 
        <span>👤 {{ request.user.username }}</span>
      </h2>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div>
        <label for="task_name">Task Name</label>
        <input type="text" id="task_name" name="task_name" placeholder="Enter task name" required>
      </div>

      <div>
        <label for="description">Description</label>
        <input type="text" id="description" name="description" placeholder="Short description" required>
      </div>

      <div>
        <label for="text">Text</label>
        <textarea id="text" name="text" placeholder="Enter detailed notes..."></textarea>
      </div>

      <div class="btn-group">
        <a href="{% url 'todo_list' %}" class="back-link">← Back to Todos</a>
        <button type="submit" class="save-btn">Save Todo</button>
      </div>
    </form>

    {% for msg in messages %}
      <p class="messages">{{ msg }}</p>
    {% endfor %}
  </div>
</body>
</html>
