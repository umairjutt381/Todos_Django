{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MyApp</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4a90e2, #50c9c3);
            min-height: 100vh;
            padding: 40px;
            color: #333;
        }

        .dashboard-container {
            background: white;
            border-radius: 15px;
            padding: 40px 35px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h2 {
            color: #333;
            font-weight: 600;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        h3 {
            margin-bottom: 15px;
            color: #4a90e2;
            font-size: 22px;
            border-bottom: 2px solid #4a90e2;
            display: inline-block;
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px 10px;
            text-align: left;
        }

        th {
            background: #4a90e2;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #f1f7ff;
        }

        .messages {
            margin-top: 15px;
            color: red;
            font-size: 14px;
        }

        .image-section {
            margin-top: 40px;
            text-align: center;
        }

        .image-section h3 {
            color: #4a90e2;
            border: none;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .dashboard-image {
            border-radius: 15px;
            width: 400px;
            max-width: 100%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        @media (max-width: 700px) {
            .dashboard-container {
                padding: 25px 20px;
            }
            table, th, td {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h2>Welcome, {{ request.user.username }}</h2>
            <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
        </div>

        <h3>All Users</h3>
        <table>
            <tr>
                <th>ID</th>
                <th>Username</th>
            </tr>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="2" style="text-align:center; color:#777;">No users found.</td></tr>
            {% endfor %}
        </table>

        <div class="messages">
            {% for msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        </div>

        <div class="image-section">
            <h3>Dashboard Image</h3>
            <img src="/media/images/picc.png" alt="Dashboard Image" class="dashboard-image">
        </div>
    </div>
</body>
</html>
